name: Telegram Calendar Bot

on:
  schedule:
    - cron: '0 9 * * *'  # Daily summary at 9:00 UTC
  workflow_dispatch:      # Manual trigger if needed

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests ics

      - name: Run script
        env:
          ICS_URL: ${{ secrets.ICS_URL }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python script.py
